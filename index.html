<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#f4f5f8">
<title>GenAI Learning Hub</title>
<meta http-equiv="refresh" content="1.35; url=genai-portal/index.html">
<link rel="canonical" href="genai-portal/index.html">
<style>
  :root{color-scheme:light dark;--p:#6f47f5;--ink:#181724;--muted:#6f6c7d;--line:rgba(28,25,43,.1);--glass:rgba(255,255,255,.7)}
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    display:grid;place-items:center;overflow:hidden;padding:24px;
    color:var(--ink);font:15px/1.6 ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:radial-gradient(circle at 15% 5%,rgba(111,71,245,.13),transparent 32rem),radial-gradient(circle at 90% 80%,rgba(60,130,240,.07),transparent 28rem),#f4f5f8;
    -webkit-font-smoothing:antialiased;
  }
  body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(40,35,60,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(40,35,60,.04) 1px,transparent 1px);background-size:42px 42px;mask-image:radial-gradient(circle,black,transparent 72%)}
  .glass{position:relative;width:min(420px,100%);padding:34px;border:1px solid rgba(255,255,255,.78);border-radius:28px;background:var(--glass);box-shadow:0 30px 90px rgba(34,28,61,.14),inset 0 1px 0 rgba(255,255,255,.72);backdrop-filter:blur(24px) saturate(150%);text-align:center}
  .mark{width:72px;height:72px;margin:0 auto 18px;position:relative}
  .mark svg{display:block;width:100%;height:100%;overflow:visible}
  .ring{fill:none;stroke:rgba(111,71,245,.16);stroke-width:5}
  .arc{fill:none;stroke:var(--p);stroke-width:5;stroke-linecap:round;stroke-dasharray:72 150;transform-origin:center;animation:spin 2.1s linear infinite}
  .core{fill:var(--p);filter:drop-shadow(0 9px 16px rgba(111,71,245,.3));animation:breathe 1.8s ease-in-out infinite}
  .spark{fill:#9e87ff;animation:spark 1.8s ease-in-out infinite;transform-origin:center}
  h1{margin:0 0 7px;font-size:22px;letter-spacing:-.035em}
  p{margin:0;color:var(--muted)}
  .bar{height:4px;margin:22px 0 16px;overflow:hidden;border-radius:99px;background:rgba(111,71,245,.09)}
  .bar i{display:block;width:45%;height:100%;border-radius:inherit;background:linear-gradient(90deg,#4f27cf,#7b57fa,#a08cff);animation:load 1.25s cubic-bezier(.22,.61,.36,1) infinite}
  a{color:var(--p);font-weight:700;text-decoration:none}
  a:hover{color:#4f27cf;text-decoration:none;text-shadow:0 0 18px rgba(111,71,245,.22)}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes breathe{50%{transform:scale(.92);opacity:.86}}
  @keyframes spark{50%{transform:scale(1.35);opacity:.55}}
  @keyframes load{from{transform:translateX(-120%)}to{transform:translateX(330%)}}
  @media(prefers-color-scheme:dark){:root{--ink:#f7f5ff;--muted:#a4a0af;--line:rgba(255,255,255,.1);--glass:rgba(23,24,34,.72)}body{background:radial-gradient(circle at 15% 5%,rgba(111,71,245,.18),transparent 32rem),#0c0d13}.glass{border-color:rgba(255,255,255,.1);box-shadow:0 30px 90px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06)}}
  @media(prefers-reduced-motion:reduce){.arc,.core,.spark,.bar i{animation:none}.bar i{width:100%}}
</style>
</head>
<body>
  <main class="glass">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 72 72">
        <circle class="ring" cx="36" cy="36" r="29"/>
        <circle class="arc" cx="36" cy="36" r="29"/>
        <rect class="core" x="20" y="20" width="32" height="32" rx="11"/>
        <circle class="spark" cx="36" cy="36" r="4" fill="#fff"/>
      </svg>
    </div>
    <h1>GenAI Learning Hub</h1>
    <p>Preparing your focused learning workspace…</p>
    <div class="bar" aria-hidden="true"><i></i></div>
    <p><a href="genai-portal/index.html">Open the hub now →</a></p>
  </main>
  <script>setTimeout(function(){location.replace("genai-portal/index.html"+(location.hash||""));},1100);</script>
</body>
</html>
